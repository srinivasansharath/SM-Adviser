# Copy to config.yaml and adjust. config.yaml is gitignored (may reference account specifics).
# Non-secret tunables live here; secrets live in .env.

portfolio:
  # Benchmarks each holding is compared against (Phase 2+).
  benchmarks:
    broad: ["NIFTY 50", "NIFTY 500"]
  # Target allocation guardrails (Phase 4+ portfolio-fit scoring).
  max_position_weight_pct: 12      # flag Trim if a single stock exceeds this
  max_sector_weight_pct: 35        # flag concentration if a sector exceeds this
  top5_concentration_warn_pct: 60  # warn if top-5 holdings exceed this share

analytics:
  lookback_trading_days: 24        # spec's "last 24 trading days" window
  rsi_period: 14
  moving_averages: [20, 50, 200]

# Scoring model — derived from RESEARCH_DECISION_METHODS.md and BUILD_PLAN §5.
# Tuned in Phase 5 backtesting; treat as informed defaults, not gospel.
scoring:
  # Composite = sum(weight * subscore), each subscore 0-100 (higher = more bullish).
  weights:
    fundamental: 0.25
    valuation: 0.20
    technical: 0.20
    thesis: 0.15
    news_risk: 0.12       # inverted: high risk -> low subscore
    portfolio_fit: 0.08
  # Composite -> classification bands (with hysteresis buffer to prevent churn).
  bands:
    accumulate_at_or_above: 75
    watch_at_or_above: 60
    hold_at_or_above: 45
    trim_at_or_above: 30
    # below trim_at_or_above => Exit Candidate
    hysteresis_points: 3
  # Hard-override rules -> straight to Exit Candidate regardless of composite.
  hard_overrides:
    interest_coverage_below: 1.5
    net_debt_ebitda_above: 4.0
    promoter_pledge_pct_above: 50
    beneish_m_above: -1.78
    altman_z_below: 1.81
    fcf_negative_years: 2          # negative FCF this many yrs while PAT positive
    auditor_resigned_months: 12
  # Confidence-decay state machine (Core -> Watch -> Exit-Candidate).
  deterioration:
    signals_for_watch: 2
    signals_for_exit_candidate: 3  # or any solvency/governance signal
  # Fundamental deterioration thresholds (feed the signal count).
  fundamental_flags:
    revenue_decline_quarters: 2
    ebitda_margin_drop_bps: 300
    roce_floor_pct: 12
    consensus_eps_cut_pct_90d: 10
    cfo_pat_ratio_min_3yr: 0.7
    dso_yoy_increase_pct: 20
    valuation_percentile_trim: 90  # trailing P/E/EV-EBITDA vs own 5-yr range

report:
  formats: ["markdown", "html"]
  output_dir: reports_out

data_sources:
  # Allowlist for news/research — social tips excluded unless labeled low-confidence.
  news_allowlist:
    - "nseindia.com"
    - "bseindia.com"
    - "moneycontrol.com"
    - "business-standard.com"
    - "livemint.com"

# New-stock screener (Phase 6) — the weekly buy-candidate funnel.
screening:
  # PUBLIC screener.in screens carrying your universe. Anonymous access is rate-limited (~500
  # rows/screen), so split the universe into non-overlapping MARKET-CAP BANDS (each < 500 rows,
  # verify the "N results" count on each) and list them here — they're fetched (throttled) + unioned.
  screen_urls:
    - "https://www.screener.in/screens/AAAA/mcap-gt-2000cr/"    # Market Capitalization > 2000
    - "https://www.screener.in/screens/BBBB/mcap-800-2000cr/"   # 800 < Market Capitalization < 2000
    - "https://www.screener.in/screens/CCCC/mcap-400-800cr/"    # 400 < Market Capitalization < 800
    - "https://www.screener.in/screens/DDDD/mcap-100-400cr/"    # 100 < Market Capitalization < 400
  # screen_url: "https://www.screener.in/screens/XXXX/one-screen/"   # single-screen (legacy) still works
  page_delay_sec: 2.0    # delay between requests, to stay under screener's anonymous rate limit
  top_deep: 150        # how many coarse-ranked names get a per-stock deep fetch
  per_sector: 3        # top-N candidates featured per sector
  sectors: 4           # number of sectors to feature (sector-diversified table = per_sector x sectors)
  llm_limit: 15        # cap on per-stock LLM deep-dives
  throttle_sec: 0.3    # politeness delay between per-stock fetches
  pledge_max_pct: 25   # promoter pledge above this -> hard exclude
  min_liquidity_cr: 1.0  # median daily traded value floor (₹ cr)
  de_max: 3.0          # extreme leverage (non-financial) -> hard exclude
