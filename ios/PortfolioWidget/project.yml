name: SMAdviser
options:
  bundleIdPrefix: com.sharath
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
targets:
  SMAdviser:
    type: application
    platform: iOS
    sources: [App, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharath.smadviser
    entitlements:
      path: App/SMAdviser.entitlements
      properties:
        com.apple.security.application-groups: [group.com.sharath.smadviser]
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: SM Adviser
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - target: PortfolioWidgetExtension
        embed: true
  PortfolioWidgetExtension:
    type: app-extension
    platform: iOS
    sources: [Widget, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharath.smadviser.PortfolioWidget
    entitlements:
      path: Widget/PortfolioWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.com.sharath.smadviser]
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: SM Adviser
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
