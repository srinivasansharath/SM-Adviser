name: SMAdviser
options:
  bundleIdPrefix: com.sharath
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only (avoids iPad multitasking-orientation requirement)
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
    CODE_SIGN_STYLE: Automatic
targets:
  SMAdviser:
    type: application
    platform: iOS
    sources: [App, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharath.smadviser
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: App/SMAdviser.entitlements
      properties:
        com.apple.security.application-groups: [group.com.sharath.smadviser]
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: SM Adviser
        UILaunchScreen: {}
        # Only standard HTTPS/TLS (exempt encryption) — skips the export-compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        # ATS enforced (no arbitrary loads): the backend is reached over HTTPS via
        # Tailscale serve with a valid Let's Encrypt cert.
    dependencies:
      - target: PortfolioWidgetExtension
        embed: true
  PortfolioWidgetExtension:
    type: app-extension
    platform: iOS
    sources: [Widget, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharath.smadviser.PortfolioWidget
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Widget/PortfolioWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.com.sharath.smadviser]
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: SM Adviser
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
